<!DOCTYPE html>
<html lang="ko" class="scroll-pt-20">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이 대시보드 | Hedge Dochi</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GFMXESYQFR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GFMXESYQFR');
    </script>
    <style>
        :root {
            --color-primary-text: #1e293b;
            --color-secondary-text: #64748b;
            --color-background: #f8fafc;
            --color-nav-bg: #ffffff;
            --nav-bg-rgb: 255, 255, 255;
            --color-nav-border: #f1f5f9;
            --color-nav-link: #2563eb;
            --color-toggle-text: #64748b;
        }
        html.dark {
            --color-primary-text: #f8fafc;
            --color-secondary-text: #94a3b8;
            --color-background: #0f172a;
            --color-nav-bg: #1e293b;
            --nav-bg-rgb: 30, 41, 59;
            --color-nav-border: #334155;
            --color-nav-link: #60a5fa;
            --color-toggle-text: #94a3b8;
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--color-background); color: var(--color-primary-text); word-break: keep-all; transition: background-color 0.3s; }
        .stat-card { background: white; border-radius: 2.5rem; padding: 2rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; transition: all 0.3s; }
        html.dark .stat-card { background: #1e293b; border-color: #334155; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen">
    <!-- 헤더 네비게이션 (공통 구조) -->
    <header class="sticky top-0 z-[100] w-full backdrop-blur-md border-b transition-colors duration-300" style="background-color: rgba(var(--nav-bg-rgb), 0.7); border-color: var(--color-nav-border);">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='index.html'">
                <span class="text-xl">💎</span>
                <span class="font-bold text-lg tracking-tight whitespace-nowrap">Hedge Dochi</span>
            </div>
            <nav class="hidden md:flex items-center gap-4">
                <a href="index.html" class="text-sm font-semibold px-3 py-2 rounded-lg transition-colors whitespace-nowrap" style="color: var(--color-nav-link);">자산 시뮬레이터</a>
                <a href="rebalance.html" class="text-sm font-semibold px-3 py-2 rounded-lg transition-colors whitespace-nowrap" style="color: var(--color-nav-link);">리밸런싱</a>
                <a href="dashboard.html" class="text-sm font-extrabold px-3 py-2 rounded-lg bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 whitespace-nowrap">대시보드</a>
                <div class="w-px h-4 bg-slate-200 dark:bg-slate-700 mx-1"></div>
                <button id="darkModeToggle" class="p-2 rounded-lg transition-colors" style="color: var(--color-toggle-text);">🌙</button>
                <div id="authContainer" class="ml-2">
                    <button id="loginBtn" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 px-4 rounded-full transition-colors">구글 로그인</button>
                    <div id="userProfile" class="hidden flex items-center gap-2">
                        <img id="userPhoto" src="" alt="Profile" class="w-8 h-8 rounded-full border border-slate-200">
                        <button id="logoutBtn" class="text-xs text-slate-500 font-semibold">로그아웃</button>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="py-12 px-4 max-w-6xl mx-auto">
        <header class="mb-12 animate-fade-in-up">
            <div class="flex flex-col md:flex-row items-center gap-6">
                <img id="dashUserPhoto" src="" class="w-24 h-24 rounded-[2rem] border-4 border-white dark:border-slate-800 shadow-2xl">
                <div class="text-center md:text-left">
                    <h1 class="text-3xl md:text-5xl font-black mb-2 tracking-tight"><span id="dashUserName" class="text-blue-600">사용자</span>님의 재무 요약</h1>
                    <p class="text-slate-500 font-medium">Hedge Dochi가 분석한 당신의 현재와 미래입니다.</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12 animate-fade-in-up" style="animation-delay: 0.1s;">
            <!-- 1. 자산 등급 -->
            <div class="stat-card flex flex-col items-center justify-center text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Wealth Tier</p>
                <div id="dashTierIcon" class="text-6xl mb-4">❓</div>
                <h3 id="dashTierName" class="text-2xl font-black">데이터 없음</h3>
                <p class="text-xs text-slate-500 mt-2">10년 후 예상 자산 등급</p>
                <a href="index.html" class="mt-6 text-blue-600 text-sm font-bold hover:underline">업데이트 ➔</a>
            </div>

            <!-- 2. 리밸런싱 점수 -->
            <div class="stat-card flex flex-col items-center justify-center text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Portfolio Score</p>
                <div id="dashScoreValue" class="text-6xl font-black text-emerald-500 mb-4">--</div>
                <h3 class="text-2xl font-black">포트폴리오 상태</h3>
                <p class="text-xs text-slate-500 mt-2">목표 비중 대비 관리 상태</p>
                <a href="rebalance.html" class="mt-6 text-blue-600 text-sm font-bold hover:underline">관리하기 ➔</a>
            </div>

            <!-- 3. 투자 성향 -->
            <div class="stat-card flex flex-col items-center justify-center text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Risk Profile</p>
                <div id="dashRiskIcon" class="text-6xl mb-4">🧠</div>
                <h3 id="dashRiskType" class="text-2xl font-black">진단 미실시</h3>
                <p id="dashRiskDesc" class="text-xs text-slate-500 mt-2">당신에게 맞는 추천 비중</p>
                <a href="risk-test.html" class="mt-6 text-blue-600 text-sm font-bold hover:underline">테스트 시작 ➔</a>
            </div>
        </div>

        <!-- 상세 리포트 섹션 (Placeholder) -->
        <div class="stat-card animate-fade-in-up" style="animation-delay: 0.2s;">
            <h3 class="text-xl font-black mb-6">최근 업데이트 내역</h3>
            <div id="dashActivityLog" class="space-y-4 text-sm text-slate-500">
                로그인이 필요하거나 데이터를 불러오는 중입니다...
            </div>
        </div>
    </main>

    <footer class="text-center py-12 border-t border-slate-100 dark:border-slate-800 mt-20 text-sm text-slate-400 px-4">
        <!-- 푸터 내용 생략 (공통) -->
    </footer>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="dark-mode.js"></script>
    <script type="module" src="dashboard.js"></script>
</body>
</html>
