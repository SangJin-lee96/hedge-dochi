<!DOCTYPE html>
<html lang="ko" class="scroll-pt-20">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hedge Dochi 서비스 이용 문의 및 제안을 남겨주세요.">
    <title>문의하기 | Hedge Dochi</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GFMXESYQFR"></script>

      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

    </script>
    <style>
        :root {
            --color-primary-text: #1e293b;
            --color-secondary-text: #64748b;
            --color-background: #f8fafc;
            --color-nav-bg: #ffffff;
            --nav-bg-rgb: 255, 255, 255;
            --color-nav-border: #f1f5f9;
            --color-nav-link: #2563eb;
            --color-toggle-text: #64748b;
        }
        html.dark {
            --color-primary-text: #f8fafc;
            --color-secondary-text: #94a3b8;
            --color-background: #0f172a;
            --color-nav-bg: #1e293b;
            --nav-bg-rgb: 30, 41, 59;
            --color-nav-border: #334155;
            --color-nav-link: #60a5fa;
            --color-toggle-text: #94a3b8;
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--color-background); color: var(--color-primary-text); word-break: keep-all; line-height: 1.7; transition: background-color 0.3s; }
    </style>
</head>
<body class="min-h-screen">
    <header class="sticky top-0 z-[100] w-full backdrop-blur-md border-b transition-colors duration-300" style="background-color: rgba(var(--nav-bg-rgb), 0.7); border-color: var(--color-nav-border);">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='index.html'">
                <span class="text-xl">💎</span>
                <span class="font-bold text-lg tracking-tight whitespace-nowrap">Hedge Dochi</span>
            </div>
            <nav class="hidden md:flex items-center gap-4">
                <a href="index.html" class="text-sm font-semibold px-3 py-2 rounded-lg transition-colors" style="color: var(--color-nav-link);">자산 시뮬레이터</a>
                <a href="rebalance.html" class="text-sm font-semibold px-3 py-2 rounded-lg transition-colors" style="color: var(--color-nav-link);">리밸런싱</a>
                <a href="guides.html" class="text-sm font-semibold px-3 py-2 rounded-lg transition-colors" style="color: var(--color-nav-link);">금융 가이드</a>
                <a href="lotto.html" class="text-sm font-semibold px-3 py-2 rounded-lg transition-colors" style="color: var(--color-nav-link);">로또 추천</a>
                <div class="w-px h-4 bg-slate-200 dark:bg-slate-700 mx-1"></div>
                <button id="darkModeToggle" class="p-2 rounded-lg transition-colors" style="color: var(--color-toggle-text);">🌙</button>
                <div id="authContainer" class="ml-2">
                    <button id="loginBtn" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 px-4 rounded-full transition-colors">구글 로그인</button>
                    <div id="userProfile" class="hidden flex items-center gap-2">
                        <img id="userPhoto" src="" alt="Profile" class="w-8 h-8 rounded-full border border-slate-200">
                        <button id="logoutBtn" class="text-xs text-slate-500 font-semibold">로그아웃</button>
                    </div>
                </div>
            </nav>
            <div class="flex items-center gap-2 md:hidden">
                <button id="darkModeToggleMobile" class="p-2 rounded-lg transition-colors" style="color: var(--color-toggle-text);">🌙</button>
                <button id="mobileMenuBtn" class="p-2 rounded-lg" style="color: var(--color-primary-text);">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </div>
        <div id="mobileMenu" class="hidden md:hidden absolute top-16 left-0 w-full border-b shadow-lg transition-all z-[110]" style="background-color: var(--color-nav-bg); border-color: var(--color-nav-border);">
            <nav class="flex flex-col p-4 space-y-2">
                <a href="index.html" class="text-base font-semibold p-4 rounded-xl whitespace-nowrap" style="color: var(--color-nav-link);">자산 시뮬레이터</a>
                <a href="rebalance.html" class="text-base font-semibold p-4 rounded-xl whitespace-nowrap" style="color: var(--color-nav-link);">리밸런싱</a>
                <a href="guides.html" class="text-base font-semibold p-4 rounded-xl whitespace-nowrap" style="color: var(--color-nav-link);">금융 가이드</a>
                <a href="lotto.html" class="text-base font-semibold p-4 rounded-xl whitespace-nowrap" style="color: var(--color-nav-link);">로또 추천</a>
                <div id="authContainerMobile" class="p-4 border-t border-slate-100 dark:border-slate-700 text-center"></div>
            </nav>
        </div>
    </header>

    <main class="py-12 px-4 max-w-2xl mx-auto">
        <div class="bg-white dark:bg-[#1e293b] p-8 md:p-12 rounded-[2.5rem] shadow-xl border border-slate-100 dark:border-slate-800">
            <h1 class="text-3xl font-black mb-2">문의하기</h1>
            <p class="text-slate-500 mb-8">서비스에 대한 피드백이나 제안을 환영합니다.</p>
            <form action="https://formspree.io/f/mojlgyan" method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold mb-2">이메일 주소</label>
                    <input type="email" name="email" required class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl p-4 focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2">상세 내용</label>
                    <textarea name="message" rows="6" required class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl p-4 focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all transform hover:-translate-y-0.5">문의 보내기</button>
            </form>
        </div>
    </main>

    <footer class="text-center py-12 border-t border-slate-100 dark:border-slate-800 mt-20 text-sm text-slate-400 px-4">
        <div class="flex justify-center space-x-6 font-bold mb-4">
            <a href="about.html" class="hover:text-blue-600">소개</a>
            <a href="tos.html" class="hover:text-blue-600">이용약관</a>
            <a href="privacy.html" class="hover:text-blue-600">개인정보처리방침</a>
            <a href="contact-form.html" class="hover:text-blue-600">문의</a>
        </div>
        <p>© 2026 Hedge Dochi. All Rights Reserved.</p>
            <p class="opacity-60 text-[10px] max-w-lg mx-auto leading-relaxed mt-2">Hedge Dochi는 데이터 기반의 금융 도구와 가이드를 제공하며, 제공되는 모든 정보는 참고용일 뿐 투자 권유를 구성하지 않습니다.</p>
    </footer>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="dark-mode.js"></script>
    <script type="module" src="auth-check.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('mobileMenuBtn');
            const menu = document.getElementById('mobileMenu');
            if (btn && menu) btn.addEventListener('click', () => { menu.classList.toggle('hidden'); });
        });
    </script>
</body>
</html>
