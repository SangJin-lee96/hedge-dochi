<!DOCTYPE html>
<html lang="ko" class="scroll-pt-20">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="매월 적립식 투자의 힘! 원금과 수익률을 입력하여 미래 자산이 얼마나 불어나는지 복리 계산기로 확인하세요. 단리 대비 차이도 분석해드립니다.">
    <title>스마트 복리 계산기 | Hedge Dochi</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GFMXESYQFR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GFMXESYQFR');
    </script>
    <style>
        :root {
            --color-primary-text: #1e293b;
            --color-secondary-text: #64748b;
            --color-background: #f8fafc; --color-accent: #2563eb;
            --color-nav-bg: #ffffff;
            --nav-bg-rgb: 255, 255, 255;
            --color-nav-border: #f1f5f9;
            --color-nav-link: #2563eb;
            --color-toggle-text: #64748b;
        }
        html.dark {
            --color-primary-text: #f8fafc;
            --color-secondary-text: #94a3b8;
            --color-background: #020617; --color-accent: #38bdf8;
            --color-nav-bg: #0f172a;
            --nav-bg-rgb: 30, 41, 59;
            --color-nav-border: #334155;
            --color-nav-link: #60a5fa;
            --color-toggle-text: #94a3b8;
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--color-background); color: var(--color-primary-text); word-break: keep-all; transition: background-color 0.3s; }
        .step-section { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen">
    <!-- 헤더 네비게이션 -->
    <header class="sticky top-0 z-[100] w-full backdrop-blur-md border-b transition-colors duration-300" style="background-color: rgba(var(--nav-bg-rgb), 0.7); border-color: var(--color-nav-border);">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='index.html'">
                <span class="text-xl">💎</span>
                <span class="font-bold text-lg tracking-tight whitespace-nowrap">Hedge Dochi</span>
            </div>
            <nav class="hidden md:flex items-center gap-4">
                <a href="index.html" class="text-sm font-semibold px-3 py-2 rounded-lg transition-colors whitespace-nowrap" style="color: var(--color-nav-link);">자산 시뮬레이터</a>
                <a href="compound.html" class="text-sm font-extrabold px-3 py-2 rounded-lg bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 whitespace-nowrap">복리 계산기</a>
                <a href="rebalance.html" class="text-sm font-semibold px-3 py-2 rounded-lg transition-colors whitespace-nowrap" style="color: var(--color-nav-link);">리밸런싱</a>
                <a href="risk-test.html" class="text-sm font-semibold px-3 py-2 rounded-lg transition-colors whitespace-nowrap" style="color: var(--color-nav-link);">성향 진단</a>
                <a href="dashboard.html" class="text-sm font-semibold px-3 py-2 rounded-lg transition-colors whitespace-nowrap" style="color: var(--color-nav-link);">대시보드</a>
                <div class="w-px h-4 bg-slate-200 dark:bg-slate-700 mx-1"></div>
                <button id="darkModeToggle" class="p-2 rounded-lg transition-colors" style="color: var(--color-toggle-text);">🌙</button>
            </nav>
        </div>
    </header>

    <main class="py-12 px-4 max-w-4xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-3xl md:text-5xl font-black mb-4 tracking-tight">⏳ 복리의 마법 계산기</h1>
            <p class="text-lg text-slate-500 font-medium">시간이 당신의 돈을 어떻게 기하급수적으로 키우는지 확인하세요.</p>
            
            <div class="mt-10 flex items-center justify-center gap-2 max-w-xs mx-auto">
                <div id="step-indicator-1" class="step-dot w-3 h-3 rounded-full bg-blue-600 transition-all"></div>
                <div class="w-8 h-0.5 bg-slate-200"></div>
                <div id="step-indicator-2" class="step-dot w-3 h-3 rounded-full bg-slate-200 transition-all"></div>
                <div id="step-indicator-3" class="step-dot w-3 h-3 rounded-full bg-slate-200 transition-all"></div>
                <div id="step-indicator-4" class="step-dot w-3 h-3 rounded-full bg-slate-200 transition-all"></div>
            </div>
        </header>

        <div class="max-w-md mx-auto">
            <!-- STEP 1: 원금 및 적립액 -->
            <div id="step-1" class="step-section space-y-8">
                <div class="bg-white dark:bg-[#1e293b] p-10 rounded-[3rem] shadow-2xl border border-slate-100 dark:border-slate-800 space-y-8">
                    <div class="input-group">
                        <label class="block text-xs font-bold mb-3 text-slate-400 uppercase tracking-widest">초기 투자 원금</label>
                        <div class="relative"><input type="number" id="c-seed" value="1000" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl p-5 pr-14 font-black text-2xl"><span class="absolute right-5 top-1/2 -translate-y-1/2 font-bold text-slate-400 text-sm">만원</span></div>
                    </div>
                    <div class="input-group">
                        <label class="block text-xs font-bold mb-3 text-slate-400 uppercase tracking-widest">매월 추가 적립액</label>
                        <div class="relative"><input type="number" id="c-monthly" value="50" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl p-5 pr-14 font-black text-2xl text-blue-600"><span class="absolute right-5 top-1/2 -translate-y-1/2 font-bold text-slate-400 text-sm">만원</span></div>
                    </div>
                </div>
                <button onclick="goToStep(2)" class="w-full py-5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-black rounded-2xl shadow-xl transition-all">다음 단계 ➔</button>
            </div>

            <!-- STEP 2: 수익률 및 기간 -->
            <div id="step-2" class="step-section hidden space-y-8">
                <div class="bg-white dark:bg-[#1e293b] p-10 rounded-[3rem] shadow-2xl border border-slate-100 dark:border-slate-800 space-y-8">
                    <div class="input-group">
                        <label class="block text-xs font-bold mb-3 text-slate-400 uppercase tracking-widest">예상 연 수익률</label>
                        <div class="relative"><input type="number" id="c-rate" value="8" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl p-5 pr-14 font-black text-2xl text-emerald-500"><span class="absolute right-5 top-1/2 -translate-y-1/2 font-bold text-slate-400 text-sm">%</span></div>
                    </div>
                    <div class="input-group">
                        <label class="block text-xs font-bold mb-3 text-slate-400 uppercase tracking-widest">투자 기간</label>
                        <div class="relative"><input type="number" id="c-period" value="10" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl p-5 pr-14 font-black text-2xl"><span class="absolute right-5 top-1/2 -translate-y-1/2 font-bold text-slate-400 text-sm">년</span></div>
                    </div>
                </div>
                <div class="flex gap-4"><button onclick="goToStep(1)" class="px-8 py-5 bg-slate-100 dark:bg-slate-800 font-bold rounded-2xl text-slate-500">이전</button><button onclick="calculateCompound()" class="flex-1 py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl transition-all">결과 보기 🚀</button></div>
            </div>

            <!-- STEP 3: 결과 요약 -->
            <div id="step-3" class="step-section hidden space-y-8">
                <div class="p-10 rounded-[3rem] bg-gradient-to-br from-blue-600 to-indigo-700 text-white shadow-2xl text-center">
                    <p class="text-[10px] font-bold uppercase tracking-[0.3em] mb-4 opacity-80">Compound Interest Result</p>
                    <h2 id="totalCompoundResult" class="text-5xl font-black mb-2">0원</h2>
                    <p id="totalProfitResult" class="text-blue-100 text-sm font-bold">수익금: 0원</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-6 rounded-[2rem] bg-white dark:bg-[#1e293b] border border-slate-100 dark:border-slate-800 shadow-lg text-center"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">총 원금</p><h4 id="totalPrincipal" class="text-lg font-black text-slate-800 dark:text-white">0원</h4></div>
                    <div class="p-6 rounded-[2rem] bg-white dark:bg-[#1e293b] border border-slate-100 dark:border-slate-800 shadow-lg text-center"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">복리 가속</p><h4 id="profitRatio" class="text-lg font-black text-emerald-500">0%</h4></div>
                </div>
                <div class="flex flex-col md:flex-row gap-3">
                    <button onclick="copyCompoundResult()" class="flex-1 py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-xl hover:bg-indigo-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <span>📋 결과 복사</span>
                    </button>
                    <button onclick="goToStep(4)" class="flex-1 py-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-black rounded-2xl shadow-xl">상세 표 보기 ➔</button>
                </div>
            </div>

            <!-- STEP 4: 상세 테이블 -->
            <div id="step-4" class="step-section hidden space-y-8">
                <div class="bg-white dark:bg-[#1e293b] p-8 rounded-[3rem] shadow-xl border border-slate-100 dark:border-slate-800 overflow-hidden">
                    <h3 class="text-xl font-black mb-6">📉 자산 성장 테이블</h3>
                    <div class="max-h-96 overflow-y-auto no-scrollbar">
                        <table class="w-full text-left border-collapse"><thead class="sticky top-0 bg-white dark:bg-[#1e293b] z-10"><tr class="text-[10px] font-bold text-slate-400 uppercase border-b dark:border-slate-800"><th class="py-4">연차</th><th class="py-4">원금</th><th class="py-4">수익</th><th class="py-4 text-right">총 자산</th></tr></thead><tbody id="compoundTableBody" class="text-xs font-bold text-slate-600 dark:text-slate-300"></tbody></table>
                    </div>
                </div>
                <button onclick="goToStep(1)" class="w-full py-5 bg-slate-100 dark:bg-slate-800 font-bold rounded-2xl text-slate-500">다시 계산하기</button>
            </div>
        </div>
    </main>

    <footer class="text-center py-12 border-t border-slate-100 dark:border-slate-800 mt-20 text-sm text-slate-400 px-4">
        <!-- 푸터 생략 -->
    </footer>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="dark-mode.js"></script>
    <script type="module" src="auth-check.js"></script>
    <script type="module" src="compound.js"></script>
</body>
</html>
