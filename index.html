<!DOCTYPE html>
<html lang="ko" class="scroll-pt-20">
<head>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hedge Dochi 8단계 투자 커리큘럼. 데이터에 기반한 자산 시뮬레이션부터 실전 포트폴리오 리밸런싱까지 한번에.">
    <title>Hedge Dochi 투자 마스터 커리큘럼</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GFMXESYQFR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GFMXESYQFR');
    </script>
    
    <style>
        :root { --color-primary-text: #0f172a; --color-background: #f8fafc; }
        html.dark { --color-primary-text: #f8fafc; --color-background: #020617; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--color-background); color: var(--color-primary-text); word-break: keep-all; transition: background-color 0.5s; }
        .step-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; }
        .step-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .step-card.locked { opacity: 0.6; filter: grayscale(0.8); cursor: not-allowed; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
        .loading-spinner { width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden transition-colors">
    <header class="sticky top-0 z-[100] w-full backdrop-blur-md border-b bg-white/70 dark:bg-slate-900/70 border-slate-100 dark:border-slate-800">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='index.html'">
                <span class="text-xl">💎</span><span class="font-bold text-lg tracking-tight">Hedge Dochi</span>
            </div>
            <nav class="flex items-center gap-3">
                <button id="darkModeToggle" class="p-2 rounded-lg transition-colors text-slate-500 dark:text-slate-400">🌙</button>
                <div id="authContainer">
                    <!-- 초기 상태를 hidden이 아닌 로딩 중으로 표시 -->
                    <button id="loginBtn" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold py-2 px-4 rounded-full transition-all">구글 로그인</button>
                    <div id="userProfile" class="hidden flex items-center gap-2">
                        <img id="userPhoto" src="" alt="Profile" class="w-8 h-8 rounded-full border border-slate-200">
                        <button id="logoutBtn" class="text-xs text-slate-500 font-semibold transition-colors hover:text-blue-600">로그아웃</button>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <section class="pt-20 pb-16 px-4 text-center max-w-4xl mx-auto animate-fade-in-up">
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 text-xs font-black uppercase tracking-widest mb-6">
            Financial Freedom Roadmap
        </div>
        <h1 class="text-4xl md:text-6xl font-black tracking-tight leading-[1.2] mb-6">
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-500">8단계 커리큘럼</span>을 따라오세요.
        </h1>
        
        <div class="mt-10 p-8 rounded-[2.5rem] bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 shadow-2xl inline-block w-full max-w-md relative overflow-hidden">
            <div class="flex items-center justify-between mb-4">
                <span class="text-sm font-bold text-slate-500">나의 진행률</span>
                <span id="progress-text" class="text-lg font-black text-blue-600">0%</span>
            </div>
            <div class="h-3 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden mb-8">
                <div id="progress-bar" class="h-full bg-blue-600 transition-all duration-1000 w-0"></div>
            </div>
            <button id="resumeBtn" class="w-full py-5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-black rounded-2xl shadow-xl flex items-center justify-center gap-3 hover:scale-[1.02] transition-all">
                <div id="btn-spinner" class="loading-spinner"></div>
                <span id="btn-text">진행 상황 확인 중...</span>
            </button>
        </div>
    </section>

    <main class="py-12 px-4 max-w-6xl mx-auto mb-20 animate-fade-in-up" style="animation-delay: 0.2s;">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="roadmapGrid"></div>
    </main>

    <script src="dark-mode.js"></script>
    <script type="module">
        import { ROADMAP_STEPS, userProgress, checkAuthAndGo, showToast } from './core.js';

        function updateUI(progress) {
            const grid = document.getElementById('roadmapGrid');
            grid.innerHTML = ROADMAP_STEPS.map((step) => {
                const isLocked = step.id > progress;
                const isCompleted = step.id < progress;
                return `
                    <div class="step-card bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-6 rounded-3xl ${isLocked ? 'locked' : 'cursor-pointer hover:border-blue-500'}" onclick="${isLocked ? '' : `location.href='${step.path}'`}">
                        ${isCompleted ? '<span class="absolute top-4 right-4 text-[10px] font-black bg-emerald-100 text-emerald-600 px-2 py-1 rounded">완료</span>' : ''}
                        <div class="text-2xl mb-4">${step.icon}</div>
                        <p class="text-[10px] font-black text-slate-400 mb-1">STEP ${step.id}</p>
                        <h3 class="text-lg font-bold text-slate-800 dark:text-white">${step.title}</h3>
                    </div>
                `;
            }).join('');

            const percent = Math.min(100, Math.round(((progress - 1) / ROADMAP_STEPS.length) * 100));
            document.getElementById('progress-text').innerText = `${percent}%`;
            document.getElementById('progress-bar').style.width = `${percent}%`;
            
            const resumeBtn = document.getElementById('resumeBtn');
            const targetStep = ROADMAP_STEPS.find(s => s.id === progress) || ROADMAP_STEPS[0];
            
            document.getElementById('btn-spinner').classList.add('hidden');
            document.getElementById('btn-text').innerText = progress > 1 ? `${targetStep.id}단계 이어서 하기 ➔` : '1단계 시작하기 ➔';
            resumeBtn.onclick = () => location.href = targetStep.path;
        }

        // 캐시 데이터로 즉시 1차 렌더링
        const cached = parseInt(localStorage.getItem('roadmapProgress')) || 1;
        updateUI(cached);

        // Firebase 데이터 로드 완료 시 2차 업데이트
        document.addEventListener('coreDataReady', (e) => {
            updateUI(e.detail.userProgress);
        });
    </script>
</body>
</html>
