<!DOCTYPE html>
<html lang="ko" class="scroll-pt-20">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="나의 은퇴 시점은 언제일까? 4% 법칙을 적용한 경제적 자유(FIRE) 계산기. 목표 은퇴 자산과 달성 가능 시점을 정밀하게 분석해드립니다.">
    <title>경제적 자유(FIRE) 은퇴 계산기 | Hedge Dochi</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GFMXESYQFR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GFMXESYQFR');
    </script>
    <style>
        :root {
            --color-primary-text: #1e293b;
            --color-secondary-text: #64748b;
            --color-background: #f8fafc;
            --color-nav-bg: #ffffff;
            --nav-bg-rgb: 255, 255, 255;
            --color-nav-border: #f1f5f9;
            --color-nav-link: #2563eb;
            --color-toggle-text: #64748b;
        }
        html.dark {
            --color-primary-text: #f8fafc;
            --color-secondary-text: #94a3b8;
            --color-background: #0f172a;
            --color-nav-bg: #1e293b;
            --nav-bg-rgb: 30, 41, 59;
            --color-nav-border: #334155;
            --color-nav-link: #60a5fa;
            --color-toggle-text: #94a3b8;
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--color-background); color: var(--color-primary-text); word-break: keep-all; transition: background-color 0.3s; }
        .step-section { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen">
    <!-- 헤더 네비게이션 -->
    <header class="sticky top-0 z-[100] w-full backdrop-blur-md border-b transition-colors duration-300" style="background-color: rgba(var(--nav-bg-rgb), 0.7); border-color: var(--color-nav-border);">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='index.html'">
                <span class="text-xl">💎</span>
                <span class="font-bold text-lg tracking-tight whitespace-nowrap">Hedge Dochi</span>
            </div>
            <nav class="hidden md:flex items-center gap-4 overflow-x-auto no-scrollbar">
                <a href="index.html" class="text-sm font-semibold px-3 py-2 rounded-lg transition-colors whitespace-nowrap" style="color: var(--color-nav-link);">자산 시뮬레이터</a>
                <a href="fire-calc.html" class="text-sm font-extrabold px-3 py-2 rounded-lg bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 whitespace-nowrap">은퇴 계산기</a>
                <a href="compound.html" class="text-sm font-semibold px-3 py-2 rounded-lg transition-colors whitespace-nowrap" style="color: var(--color-nav-link);">복리 계산기</a>
                <a href="rebalance.html" class="text-sm font-semibold px-3 py-2 rounded-lg transition-colors whitespace-nowrap" style="color: var(--color-nav-link);">리밸런싱</a>
                <a href="dashboard.html" class="text-sm font-semibold px-3 py-2 rounded-lg transition-colors whitespace-nowrap" style="color: var(--color-nav-link);">대시보드</a>
                <button id="darkModeToggle" class="p-2 rounded-lg transition-colors" style="color: var(--color-toggle-text);">🌙</button>
                <div id="authContainer" class="ml-2">
                    <button id="loginBtn" class="bg-blue-600 text-white text-xs font-bold py-2 px-4 rounded-full">구글 로그인</button>
                    <div id="userProfile" class="hidden flex items-center gap-2">
                        <img id="userPhoto" src="" alt="Profile" class="w-8 h-8 rounded-full border border-slate-200">
                        <button id="logoutBtn" class="text-xs text-slate-500 font-semibold">로그아웃</button>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="py-12 px-4 max-w-4xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-3xl md:text-5xl font-black mb-4 tracking-tight">🏁 파이어족 은퇴 계산기</h1>
            <p class="text-lg text-slate-500 font-medium">경제적 자유까지 얼마나 남았을까요? 데이터로 분석해 드립니다.</p>
            
            <div class="mt-10 flex items-center justify-center gap-2 max-w-xs mx-auto">
                <div id="step-indicator-1" class="step-dot w-3 h-3 rounded-full bg-blue-600 transition-all"></div>
                <div class="w-8 h-0.5 bg-slate-200"></div>
                <div id="step-indicator-2" class="step-dot w-3 h-3 rounded-full bg-slate-200 transition-all"></div>
                <div class="w-8 h-0.5 bg-slate-200"></div>
                <div id="step-indicator-3" class="step-dot w-3 h-3 rounded-full bg-slate-200 transition-all"></div>
                <div class="w-8 h-0.5 bg-slate-200"></div>
                <div id="step-indicator-4" class="step-dot w-3 h-3 rounded-full bg-slate-200 transition-all"></div>
            </div>
        </header>

        <div class="max-w-4xl mx-auto">
            <!-- STEP 1: 생활비 설정 -->
            <div id="step-1" class="step-section space-y-8">
                <div class="max-w-md mx-auto bg-white dark:bg-[#1e293b] p-10 rounded-[3rem] shadow-2xl border border-slate-100 dark:border-slate-800 space-y-8">
                    <div class="input-group text-center">
                        <label class="block text-xs font-bold mb-3 text-slate-400 uppercase tracking-widest">은퇴 후 희망 월 생활비</label>
                        <div class="relative"><input type="number" id="f-expense" value="300" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl p-5 pr-14 font-black text-2xl text-center"><span class="absolute right-5 top-1/2 -translate-y-1/2 font-bold text-slate-400 text-sm">만원</span></div>
                    </div>
                </div>
                <div class="flex justify-center"><button onclick="goToStep(2)" class="px-12 py-5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-black rounded-2xl shadow-xl transition-all">다음 단계 ➔</button></div>
            </div>

            <!-- STEP 2: 자산 및 저축액 -->
            <div id="step-2" class="step-section hidden space-y-8">
                <div class="max-w-md mx-auto bg-white dark:bg-[#1e293b] p-10 rounded-[3rem] shadow-2xl border border-slate-100 dark:border-slate-800 space-y-8">
                    <div class="input-group text-center">
                        <label class="block text-xs font-bold mb-3 text-slate-400 uppercase tracking-widest">현재 보유 순자산</label>
                        <div class="relative"><input type="number" id="f-seed" value="5000" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl p-5 pr-14 font-black text-2xl text-center"><span class="absolute right-5 top-1/2 -translate-y-1/2 font-bold text-slate-400 text-sm">만원</span></div>
                    </div>
                    <div class="input-group text-center">
                        <label class="block text-xs font-bold mb-3 text-slate-400 uppercase tracking-widest">연간 추가 저축액</label>
                        <div class="relative"><input type="number" id="f-annual-save" value="2400" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl p-5 pr-14 font-black text-2xl text-center text-blue-600"><span class="absolute right-5 top-1/2 -translate-y-1/2 font-bold text-slate-400 text-sm">만원</span></div>
                    </div>
                </div>
                <div class="flex justify-center gap-4"><button onclick="goToStep(1)" class="px-8 py-5 bg-slate-100 dark:bg-slate-800 font-bold rounded-2xl text-slate-500">이전</button><button onclick="goToStep(3)" class="px-12 py-5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-black rounded-2xl shadow-xl">다음 단계 ➔</button></div>
            </div>

            <!-- STEP 3: 수익률 설정 -->
            <div id="step-3" class="step-section hidden space-y-8">
                <div class="max-w-md mx-auto bg-white dark:bg-[#1e293b] p-10 rounded-[3rem] shadow-2xl border border-slate-100 dark:border-slate-800 space-y-8">
                    <div class="input-group text-center">
                        <label class="block text-xs font-bold mb-3 text-slate-400 uppercase tracking-widest">기대 투자 수익률 (연)</label>
                        <div class="relative"><input type="number" id="f-rate" value="7" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl p-5 pr-14 font-black text-2xl text-center text-emerald-500"><span class="absolute right-5 top-1/2 -translate-y-1/2 font-bold text-slate-400 text-sm">%</span></div>
                    </div>
                </div>
                <div class="flex justify-center gap-4"><button onclick="goToStep(2)" class="px-8 py-5 bg-slate-100 dark:bg-slate-800 font-bold rounded-2xl text-slate-500">이전</button><button onclick="calculateFIRE()" class="px-12 py-5 bg-blue-600 text-white font-black rounded-2xl shadow-xl animate-pulse">은퇴 시점 계산하기 🚀</button></div>
            </div>

            <!-- STEP 4: 결과 리포트 -->
            <div id="step-4" class="step-section hidden space-y-10 animate-fade-in-up">
                <div class="p-10 rounded-[3rem] bg-gradient-to-br from-slate-800 to-slate-900 text-white shadow-2xl text-center relative overflow-hidden">
                    <p class="text-[10px] font-bold uppercase tracking-[0.3em] mb-6 opacity-60">Estimated FIRE Achievement</p>
                    <div class="text-7xl mb-6">🏝️</div>
                    <h2 id="fireYearsResult" class="text-5xl font-black mb-4">0년 후</h2>
                    <p id="fireDateResult" class="text-slate-400 font-bold">당신은 20XX년에 은퇴 가능합니다.</p>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="space-y-6">
                        <div class="p-8 rounded-[2.5rem] bg-white dark:bg-[#1e293b] shadow-xl border border-slate-100 dark:border-slate-800 text-center"><p class="text-[10px] font-bold text-slate-400 uppercase mb-2">목표 은퇴 자산</p><h3 id="fireGoalAmount" class="text-3xl font-black text-blue-600">0원</h3></div>
                        <div class="p-8 rounded-[2.5rem] bg-white dark:bg-[#1e293b] shadow-xl border border-slate-100 dark:border-slate-800 text-center"><p class="text-[10px] font-bold text-slate-400 uppercase mb-2">월 예상 인출액</p><h3 id="fireMonthlyIncome" class="text-3xl font-black text-emerald-500">0원</h3></div>
                    </div>
                    <div class="p-8 rounded-[2.5rem] bg-white dark:bg-[#1e293b] shadow-xl border border-slate-100 dark:border-slate-800">
                        <h4 class="text-sm font-black mb-6">📉 자산 성장 궤적</h4>
                        <div class="relative h-48"><canvas id="fireChart"></canvas></div>
                    </div>
                </div>

                <div class="p-8 rounded-[2.5rem] bg-amber-50 dark:bg-amber-900/10 border border-amber-100 dark:border-amber-900/30">
                    <h4 class="font-bold mb-3 flex items-center text-amber-800 dark:text-amber-300">💡 은퇴 전략 조언</h4>
                    <p id="fireAdvice" class="text-sm leading-relaxed text-amber-900/80 dark:text-amber-200/80"></p>
                </div>

                <div class="text-center"><button onclick="goToStep(1)" class="px-12 py-5 bg-slate-100 dark:bg-slate-800 font-bold rounded-2xl text-slate-500">다시 계산하기</button></div>
            </div>
        </div>
    </main>

    <footer class="text-center py-12 border-t border-slate-100 dark:border-slate-800 mt-20 text-sm text-slate-400 px-4">
        <!-- 푸터 생략 -->
    </footer>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="dark-mode.js"></script>
    <script type="module" src="auth-check.js"></script>
    <script type="module" src="fire-calc.js"></script>
</body>
</html>
