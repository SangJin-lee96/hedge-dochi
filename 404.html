<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다 | Hedge Dochi</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; word-break: keep-all; }
        .container { text-align: center; padding: 2rem; max-width: 400px; }
        .icon { font-size: 6rem; margin-bottom: 2rem; display: block; animation: float 3s ease-in-out infinite; }
        h1 { font-size: 2rem; font-weight: 900; margin-bottom: 1rem; color: #3b82f6; }
        p { color: #64748b; margin-bottom: 2.5rem; line-height: 1.6; }
        .btn { background-color: #3b82f6; color: white; padding: 1rem 2rem; border-radius: 1.5rem; text-decoration: none; font-weight: 800; display: inline-block; transition: all 0.3s; box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3); }
        .btn:hover { background-color: #2563eb; transform: translateY(-2px); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>
    <div class="container">
        <span class="icon">🦔</span>
        <h1>길을 잃으셨나요?</h1>
        <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.<br>고슴도치를 따라 홈으로 돌아가세요!</p>
        <a href="index.html" class="btn">홈으로 안전하게 이동 ➔</a>
    </div>
</body>
</html>
